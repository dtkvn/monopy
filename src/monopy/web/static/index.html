<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monopy Online - Multiplayer Monopoly Clone</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div id="app">
    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen active">
      <div class="glass-card main-lobby-card">
        <div class="logo-area">
          <h1>MONOPY</h1>
          <p class="subtitle">Real-time Multiplayer Monopoly Clone</p>
        </div>

        <div class="lobby-actions">
          <!-- Create Lobby -->
          <div class="action-box">
            <h3>Create New Lobby</h3>
            <div class="input-group">
              <i class="fa-solid fa-user"></i>
              <input type="text" id="create-player-name" placeholder="Enter your name" maxlength="15">
            </div>
            <button id="btn-create-lobby" class="btn btn-primary">
              <i class="fa-solid fa-plus"></i> Create Lobby
            </button>
          </div>

          <div class="divider-text">OR</div>

          <!-- Join Lobby -->
          <div class="action-box">
            <h3>Join Existing Lobby</h3>
            <div class="input-group">
              <i class="fa-solid fa-user"></i>
              <input type="text" id="join-player-name" placeholder="Enter your name" maxlength="15">
            </div>
            <div class="input-group">
              <i class="fa-solid fa-key"></i>
              <input type="text" id="join-lobby-code" placeholder="Lobby Code (e.g. ABCD)" maxlength="4"
                style="text-transform: uppercase;">
            </div>
            <button id="btn-join-lobby" class="btn btn-secondary">
              <i class="fa-solid fa-right-to-bracket"></i> Join Lobby
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
      <!-- Header bar -->
      <header class="game-header">
        <div class="header-logo">MONOPY</div>
        <div class="volume-control">
          <label for="volumeSlider">Volume:</label>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" />
        </div>
        <div class="lobby-badge">
          Lobby Code: <span id="display-lobby-code">----</span>
          <button id="btn-copy-code" title="Copy Code"><i class="fa-regular fa-copy"></i></button>
        </div>
        <div class="player-count">
          <i class="fa-solid fa-users"></i> <span id="display-player-count">0/8</span> Players
        </div>
      </header>

      <div class="game-layout">
        <!-- LEFT SIDEBAR: PLAYERS -->
        <div class="game-sidebar-left">

          <div class="glass-card sidebar-card">
            <h3><i class="fa-solid fa-users"></i> Players</h3>
            <div id="players-list" class="players-container">
              <!-- Populated by JS -->
            </div>

            <div class="lobby-controls" id="lobby-pregame-controls">
              <p class="waiting-msg">Waiting for the lobby host to start the game...</p>
              <button id="btn-start-game" class="btn btn-primary btn-block hide">
                <i class="fa-solid fa-play"></i> Start Game
              </button>
            </div>
          </div>

          <div class="glass-card properties-card">
            <h3><i class="fa-solid fa-scroll"></i> Properties</h3>
            <div id="game-properties" class="properties-container">
            </div>
          </div>

        </div>

        <!-- CENTER BOARD -->
        <main class="board-wrapper">
          <div class="board" id="monopoly-board">
            <!-- 40 spaces rendered by JS dynamically to guarantee exact 11x11 layout -->
          </div>
        </main>

        <!-- RIGHT SIDEBAR: CHAT & LOG -->
        <div class="game-sidebar-right">
          <!-- LOGS PANEL -->
          <div class="glass-card log-card">
            <h3><i class="fa-solid fa-scroll"></i> Activity Log</h3>
            <div id="game-logs" class="logs-container">
              <!-- Log events -->
            </div>
          </div>

          <!-- CHAT PANEL -->
          <div class="glass-card chat-card">
            <h3><i class="fa-solid fa-comments"></i> Lobby Chat</h3>
            <div id="chat-messages" class="chat-messages-container">
              <!-- Messages -->
            </div>
            <div class="chat-input-area">
              <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100">
              <button id="btn-send-chat" class="btn btn-icon"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL FOR ANNOUNCEMENTS / DECISIONS -->
  <div id="decision-modal" class="modal-overlay hide">
    <div class="glass-card modal-content">
      <h2 id="modal-title">Property Option</h2>
      <div id="modal-body" class="modal-body">
        <!-- Action details -->
      </div>
      <div id="modal-actions" class="modal-actions">
        <!-- Action buttons -->
      </div>
    </div>
  </div>

  <!-- Script -->
  <script src="/static/app.js"></script>
</body>

</html>
